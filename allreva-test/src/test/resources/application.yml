swagger:
  server:
    protocol: http
    domain: localhost:8080

cors:
  allowed-origin-patterns: http://localhost:3000


spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        show_sql: false

  flyway:
    enabled: true
    mixed: true
    postgresql:
      transactional-lock: false

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  cloud:
    aws:
      s3:
        bucket: test-bucket
      credentials:
        access-key: test
        secret-key: test
      region:
        static: us-east-1

auth:
  jwt:
    secret-key: test-jwt-secret-key-must-be-long-enough-for-hmac
    access-token:
      expiration: 3600000
      header: Authorization
    refresh-token:
      name: refreshToken
      expiration: 1209600033
      cookie:
        domain: ""
        secure: false
        same-site: Lax

oauth2:
  kakao:
    redirect-uri: http://localhost:3000/signup/callback
    client-id: test-kakao-client-id
    client-secret: test-kakao-client-secret
    api-url: http://localhost:${wiremock.server.port}
    auth-url: http://localhost:${wiremock.server.port}

public-data:
  kopis:
    base-url: http://localhost:${wiremock.server.port}/openApi/restful
    service-key: test-kopis-key

view:
  count:
    schedule:
      rate: 3000

fcm:
  project-id: test-fcm-project-id
  service-account-key: classpath:firebase/firebase-service-account-key.json

thread-pool:
  task:
    core-size: 10
    max-size: 20
    queue-capacity: 50
  notification:
    core-size: 5
    max-size: 10
    queue-capacity: 30

logging:
  level:
    "[com.backend.allreva]": WARN
    "[org.hibernate.SQL]": OFF
    "[org.hibernate.type.descriptor.sql.BasicBinder]": OFF
    "[org.springframework.web]": WARN
    "[org.springframework.security]": WARN
