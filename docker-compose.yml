version: '3'

services:
  postgres:
    container_name: allreva-postgres
    image: postgres:16
    environment:
      POSTGRES_DB: allreva
      POSTGRES_USER: allreva
      POSTGRES_PASSWORD: allreva
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - allreva

  redis:
    container_name: redis-dev
    image: redis
    ports:
      - "6379:6379"
    networks:
      - allreva

networks:
  allreva:
    name: allreva

volumes:
  postgres_data:
