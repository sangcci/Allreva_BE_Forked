upstream was_backend {
	server 192.168.122.20:8081;
}

server {
	listen 80;
	server_name allreva.site;

	add_header X-Frame-Options	  "SAMEORIGIN" always;
	add_header X-Content-Type-Options "nosniff"  always;

	location ~* /\. {
		return 403;
	}

	location ~* \.(env|git|bak|sql|log|htaccess|htpasswd)$ {
		return 403;
	}

	location ~* /(wp-admin|wp-login|phpmyadmin|phpinfo|adminer|actuator) {
		return 403;
	}

	location ~* /actuator {
		return 404;
	}

	# Swagger with Basic Auth
	location ~* /(swagger-ui|v3/api-docs) {
		auth_basic "Staging Access";
		auth_basic_user_file /etc/nginx/.htpasswd;

		proxy_pass http://was_backend;
		proxy_set_header Host		  $host;
		proxy_set_header X-Real-IP	  $remote_addr;
		proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# Token for staging server test
	location /api/test {
		auth_basic "Staging Access";
		auth_basic_user_file /etc/nginx/.htpasswd;

		proxy_pass http://was_backend;
		proxy_set_header Host		  $host;
		proxy_set_header X-Real-IP	  $remote_addr;
		proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# Prometheus stub_status
	location /stub_status {
		stub_status;
		allow 172.16.0.0/12;
		deny all;
	}

	# Authentication Endpoint
	location /api/v1/auth/ {
		# limit_req zone=auth burst=3 nodelay;
		# limit_req_status 429;

		proxy_pass http://was_backend;
		proxy_set_header Host		  $host;
		proxy_set_header X-Real-IP	  $remote_addr;
		proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# API Endpoint
	location /api/ {
		# limit_req zone=api burst=10 nodelay;
		# limit_req_status 429;

		proxy_pass http://was_backend;
		proxy_set_header Host		  $host;
		proxy_set_header X-Real-IP	  $remote_addr;
		proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}
