name: CI/CD

on:
  push:
    branches:
      - develop
  pull_request:

env:
  APP_NAME: allreva-springboot

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Gradle Caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Spotless Check
        run: ./gradlew spotlessCheck

      - name: Run tests
        run: ./gradlew test

  cd:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Gradle Caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew bootJar

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${APP_NAME}:latest .

      - name: Push to DockerHub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/${APP_NAME}:latest

  deploy-app:
    needs: cd
    if: github.event_name == 'push'
    runs-on: [self-hosted, was]

    steps:
      - name: Blue-Green deploy
        run: ~/deploy/deploy.sh ${APP_NAME} ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Output active slot
        id: slot
        run: echo "active=$(cat ~/deploy/active-slot)" >> $GITHUB_OUTPUT

    outputs:
      active-slot: ${{ steps.slot.outputs.active }}

  switch-nginx:
    needs: deploy-app
    if: github.event_name == 'push'
    runs-on: [self-hosted, web]

    steps:
      - name: Switch Nginx upstream
        run: ~/nginx/switch.sh ${{ needs.deploy-app.outputs.active-slot }}
