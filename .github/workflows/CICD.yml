name: CI/CD

on:
  push:
    branches:
      - develop
  pull_request:

env:
  APP_NAME: allreva-springboot

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Gradle Caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Spotless Check
        run: ./gradlew spotlessCheck

      - name: Run tests
        run: ./gradlew test

      - name: Build application jars
        run: ./gradlew :allreva-api:bootJar :allreva-batch:bootJar

  cd:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Gradle Caching
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build API jar with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :allreva-api:bootJar

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: docker build -t $DOCKERHUB_USERNAME/${APP_NAME}:latest .

      - name: Push to DockerHub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: docker push $DOCKERHUB_USERNAME/${APP_NAME}:latest

  deploy-app:
    needs: cd
    if: github.event_name == 'push'
    runs-on: [self-hosted, was]

    steps:
      - uses: actions/checkout@v4

      - name: Sync deploy scripts
        run: |
          mkdir -p ~/deploy
          cp deploy/deploy.sh ~/deploy/deploy.sh
          chmod +x ~/deploy/deploy.sh

      - name: Blue-Green deploy
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: ~/deploy/deploy.sh ${APP_NAME} $DOCKERHUB_USERNAME

      - name: Output active slot
        id: slot
        run: echo "active=$(cat ~/deploy/active-slot)" >> $GITHUB_OUTPUT

    outputs:
      active-slot: ${{ steps.slot.outputs.active }}

  switch-nginx:
    needs: deploy-app
    if: github.event_name == 'push'
    runs-on: [self-hosted, web]

    steps:
      - uses: actions/checkout@v4

      - name: Sync nginx config
        env:
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
        run: |
          mkdir -p ~/nginx/conf.d
          cp infra/nginx.conf ~/nginx/nginx.conf
          cp infra/conf.d/default.conf ~/nginx/conf.d/default.conf
          cp infra/docker-compose.yml ~/nginx/docker-compose.yml
          cp infra/switch.sh ~/nginx/switch.sh
          chmod +x ~/nginx/switch.sh
          echo "TUNNEL_TOKEN=$TUNNEL_TOKEN" > ~/nginx/.env

      - name: Switch Nginx upstream
        run: ~/nginx/switch.sh ${{ needs.deploy-app.outputs.active-slot }}
