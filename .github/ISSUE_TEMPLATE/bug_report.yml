name: 버그 리포트
description: 버그를 발견하셨나요? 재현 방법과 함께 알려주세요.
labels: ["🐛 bug"]
title: "[BUG] "
body:
  - type: input
    id: summary
    attributes:
      label: 버그 요약
      description: 어떤 문제가 발생했는지 한 줄로 설명해주세요.
      placeholder: ex) 차 대절 예약 시 passengerCount가 감소하지 않음
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현할 수 있는 단계를 순서대로 작성해주세요.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작할 경우 어떤 결과가 나와야 하나요?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 어떤 결과가 나왔나요?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 환경
      description: Java, Spring Boot 버전 등 관련 환경을 작성해주세요.
      placeholder: |
        - Java: 17
        - Spring Boot: 3.3.5
        - DB: PostgreSQL
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 관련 로그 / 스택트레이스
      description: 관련 로그나 에러 메시지가 있다면 붙여넣어주세요.
      render: shell
    validations:
      required: false
