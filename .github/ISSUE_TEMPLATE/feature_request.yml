name: 기능 추가
description: 새로운 기능이나 개선 사항을 제안해주세요.
labels: ["✨ feat"]
title: "[FEAT] "
body:
  - type: input
    id: summary
    attributes:
      label: 기능 요약
      description: 추가하려는 기능을 한 줄로 설명해주세요.
      placeholder: ex) 차 대절 예약 시 PostgreSQL Advisory Lock으로 동시성 제어
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: 배경 및 목적
      description: 왜 이 기능이 필요한가요? 해결하려는 문제나 달성하려는 목표를 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 구현 방향
      description: 어떻게 구현할지 체크리스트로 작성해주세요.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 문서, 링크, PR 등이 있다면 작성해주세요.
    validations:
      required: false
